name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install moss-build
        run: pip install -e .

      - name: Clone test components
        run: |
          git clone --depth 1 https://github.com/moss339/mshm.git /tmp/mshm
          git clone --depth 1 https://github.com/moss339/mdds.git /tmp/mdds
          git clone --depth 1 https://github.com/moss339/mcom.git /tmp/mcom

      - name: Create build_options.yaml
        run: |
          cat > /tmp/build_options.yaml << 'EOF'
          cxx_standard: C++17
          cxx_flags: [-Wall, -Wextra]
          build_type: Release
          parallel_jobs: 2
          cmake_options:
            CMAKE_POSITION_INDEPENDENT_CODE: ON
          EOF

      - name: Create component.yaml for mshm
        run: |
          cat > /tmp/mshm/component.yaml << 'EOF'
          name: mshm
          description: MOSS Shared Memory
          dependencies:
            local: []
          build:
            type: library
          install:
            type: library
          EOF

      - name: Create component.yaml for mdds
        run: |
          cat > /tmp/mdds/component.yaml << 'EOF'
          name: mdds
          description: MOSS Decentralized Discovery
          dependencies:
            local: [mshm]
          build:
            type: library
            cmake_options:
              MDDS_BUILD_EXAMPLES: OFF
              MDDS_BUILD_TESTS: OFF
          install:
            type: library
          EOF

      - name: Create moss.yaml
        run: |
          cat > /tmp/moss.yaml << 'EOF'
          name: test-moss
          build_options: /tmp/build_options.yaml
          settings:
            build_root: ./build
            install_root: ./dist
            cache_dir: .moss/cache
          components:
            - name: mshm
              path: /tmp/mshm
            - name: mdds
              path: /tmp/mdds
          EOF

      - name: Validate
        run: moss-build validate -c /tmp/moss.yaml

      - name: List
        run: moss-build list -c /tmp/moss.yaml

      - name: Deps
        run: moss-build deps -c /tmp/moss.yaml

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install moss-build
        run: pip install -e .

      - name: Clone test components
        run: |
          git clone --depth 1 https://github.com/moss339/mshm.git /tmp/mshm
          git clone --depth 1 https://github.com/moss339/mdds.git /tmp/mdds
          git clone --depth 1 https://github.com/moss339/mcom.git /tmp/mcom

      - name: Create build_options.yaml
        run: |
          cat > /tmp/build_options.yaml << 'EOF'
          cxx_standard: C++17
          build_type: Release
          parallel_jobs: 2
          cmake_options:
            CMAKE_POSITION_INDEPENDENT_CODE: ON
          EOF

      - name: Create component.yaml for mshm
        run: |
          cat > /tmp/mshm/component.yaml << 'EOF'
          name: mshm
          description: MOSS Shared Memory
          dependencies:
            local: []
          build:
            type: library
          install:
            type: library
          EOF

      - name: Create component.yaml for mdds
        run: |
          cat > /tmp/mdds/component.yaml << 'EOF'
          name: mdds
          description: MOSS Decentralized Discovery
          dependencies:
            local: [mshm]
          build:
            type: library
            cmake_options:
              MDDS_BUILD_EXAMPLES: OFF
              MDDS_BUILD_TESTS: OFF
          install:
            type: library
          EOF

      - name: Create moss.yaml
        run: |
          cat > /tmp/moss.yaml << 'EOF'
          name: test-moss
          build_options: /tmp/build_options.yaml
          settings:
            build_root: /tmp/test-build/build
            install_root: /tmp/test-build/dist
            cache_dir: /tmp/test-build/.moss/cache
          components:
            - name: mshm
              path: /tmp/mshm
            - name: mdds
              path: /tmp/mdds
          EOF

      - name: Build
        run: moss-build build -c /tmp/moss.yaml -j 2

      - name: Verify
        run: |
          ls -la /tmp/test-build/build/mshm/src/ || ls -la /tmp/test-build/build/mshm/
          test -f /tmp/test-build/build/mshm/src/libmshm.a || test -f /tmp/test-build/build/mshm/libmshm.a
          echo "Build verification passed"

      - name: Install
        run: moss-build install -c /tmp/moss.yaml

      - name: Verify install
        run: |
          ls /tmp/test-build/dist/
          test -f /tmp/test-build/dist/deploy_manifest.yaml
          echo "Install verification passed"
